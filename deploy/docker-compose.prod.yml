# ============================================================
# MetaPool — 生产/演示环境 Docker Compose
# 用途：全量容器化部署（含 Java 应用），数据持久化 + 资源限制
# 启动：docker compose -f docker-compose.prod.yml up -d
# 停止：docker compose -f docker-compose.prod.yml down
# ============================================================

version: "3.9"

services:
  # ─────────────────────────────────────────────────────────
  # PostgreSQL 17.4 — 数据库连接池验证目标
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:17.4-alpine
    container_name: metapool-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metapool}
      POSTGRES_USER: ${POSTGRES_USER:-metapool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metapool} -d ${POSTGRES_DB:-metapool}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    networks:
      - metapool-net

  # ─────────────────────────────────────────────────────────
  # Redis 7.2.8 — 分布式锁 + Redis 连接池验证目标
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.2.8-alpine
    container_name: metapool-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - metapool-net

  # ─────────────────────────────────────────────────────────
  # Prometheus 3.2.0 — 指标拉取 + 告警规则评估
  # ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: metapool-prom
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-15}d"
      - "--web.enable-lifecycle"
      - "--web.external-url=http://localhost:9090"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/prometheus-alert-rules.yml:/etc/prometheus/prometheus-alert-rules.yml:ro
      - promdata:/prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    networks:
      - metapool-net

  # ─────────────────────────────────────────────────────────
  # AlertManager 0.28.0 — 告警聚合/去重/路由
  # ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: metapool-alert
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertdata:/alertmanager
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - metapool-net

  # ─────────────────────────────────────────────────────────
  # Grafana 11.6.0 — 仪表板可视化
  # ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: metapool-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_AUTH_BASIC_ENABLED: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/global-health.json
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana/dashboards/thread-pool.json:/etc/grafana/dashboards/thread-pool.json:ro
      - ./grafana/dashboards/connection-pool.json:/etc/grafana/dashboards/connection-pool.json:ro
      - ./grafana/dashboards/global-health.json:/etc/grafana/dashboards/global-health.json:ro
      - grafanadata:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - metapool-net

volumes:
  pgdata:
  redisdata:
  promdata:
  alertdata:
  grafanadata:

networks:
  metapool-net:
    name: metapool-net
    driver: bridge
