# ============================================================
# MetaPool — Grafana Prometheus 数据源配置
# 自动 provisioning，Grafana 启动时加载
# ============================================================
apiVersion: 1

datasources:
  - name: "Prometheus-MetaPool"
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "GET"
