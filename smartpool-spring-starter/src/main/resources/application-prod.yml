# ============================================================
# SmartPool — 生产/演示环境配置
# 激活方式：spring.profiles.active=prod
# 使用场景：Docker Compose 全量容器化部署
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://smartpool-pg:5432/smartpool
    username: ${SMARTPOOL_DB_USERNAME}
    password: ${SMARTPOOL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: smartpool-redis
      port: 6379
      password: ${SMARTPOOL_REDIS_PASSWORD}

logging:
  level:
    com.smartpool: INFO
    io.micrometer: WARN
    net.bytebuddy: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,smartpool
